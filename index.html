<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вкусняшка — Доставка еды</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFBF5;
  --card: #FFFFFF;
  --accent: #E8450A;
  --accent2: #FF7A3D;
  --text: #1A1008;
  --muted: #7A6A5A;
  --border: #F0E8DC;
  --tag-bg: #FFF0E8;
  --tag-text: #C93A08;
  --green: #1A7A4A;
  --green-bg: #E8F5EE;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--text);
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #fff; letter-spacing: -0.5px; }
.logo span { color: var(--accent2); }
.header-right { display: flex; align-items: center; gap: 12px; }
.cart-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 24px;
  padding: 8px 16px; font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .2s;
}
.cart-btn:hover { background: var(--accent2); }
.cart-count {
  background: #fff; color: var(--accent); border-radius: 50%;
  width: 18px; height: 18px; font-size: 11px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
}

/* HERO */
.hero {
  background: var(--text);
  padding: 2rem 1.5rem 2.5rem;
  text-align: center;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(232,69,10,0.3) 0%, transparent 70%);
  border-radius: 50%;
}
.hero-badge {
  display: inline-block;
  background: var(--tag-bg); color: var(--tag-text);
  font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 7vw, 48px); color: #fff;
  line-height: 1.15; margin-bottom: 10px;
}
.hero h1 em { color: var(--accent2); font-style: normal; }
.hero p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 1.5rem; }
.hero-meta { display: flex; justify-content: center; gap: 20px; }
.hero-meta-item { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); font-size: 12px; }
.hero-meta-item svg { width: 14px; height: 14px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); display: inline-block; }

/* CATEGORIES */
.categories {
  display: flex; gap: 8px; overflow-x: auto; padding: 1.25rem 1.5rem;
  scrollbar-width: none; background: var(--bg);
  border-bottom: 1px solid var(--border); position: sticky; top: 60px; z-index: 90;
}
.categories::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap; padding: 7px 16px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: transparent; color: var(--muted);
  font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .18s; flex-shrink: 0;
}
.cat-btn.active, .cat-btn:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* MENU GRID */
.section { padding: 1.5rem; }
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; margin-bottom: 1rem; color: var(--text);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
}
.card {
  background: var(--card); border-radius: 16px;
  border: 1px solid var(--border); overflow: hidden;
  transition: transform .18s, box-shadow .18s; cursor: pointer;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,16,8,0.1); }
.card-img {
  width: 100%; aspect-ratio: 1/1; object-fit: cover;
  background: var(--tag-bg); display: flex; align-items: center;
  justify-content: center; font-size: 44px;
}
.card-body { padding: 10px 12px 12px; }
.card-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
.card-desc { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-price { font-size: 15px; font-weight: 700; color: var(--accent); }
.add-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 18px; line-height: 1; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
}
.add-btn:hover { background: var(--accent2); transform: scale(1.1); }
.badge-hot {
  display: inline-block; background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 4px; margin-bottom: 4px;
}
.badge-new {
  display: inline-block; background: var(--green-bg); color: var(--green);
  font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 4px; margin-bottom: 4px;
}

/* CART DRAWER */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
.overlay.open { display: block; }
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: min(380px, 100vw);
  background: var(--bg); z-index: 201;
  transform: translateX(100%); transition: transform .3s ease;
  display: flex; flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,0.15);
}
.drawer.open { transform: translateX(0); }
.drawer-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-title { font-family: 'Playfair Display', serif; font-size: 20px; }
.close-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--border); border: none; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.drawer-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
.empty-cart { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 14px; }
.empty-cart .emoji { font-size: 40px; display: block; margin-bottom: 8px; }
.cart-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.cart-item-emoji { font-size: 28px; width: 44px; text-align: center; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 13px; font-weight: 600; }
.cart-item-price { font-size: 12px; color: var(--muted); }
.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid var(--border); background: transparent;
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
  color: var(--text); transition: all .15s;
}
.qty-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.qty-num { font-size: 13px; font-weight: 600; min-width: 16px; text-align: center; }
.drawer-footer { padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); }
.total-row { display: flex; justify-content: space-between; margin-bottom: 1rem; }
.total-label { font-size: 14px; color: var(--muted); }
.total-amount { font-size: 20px; font-weight: 700; color: var(--text); }
.order-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff; border: none; border-radius: 12px;
  font-family: 'Manrope', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.order-btn:hover { background: var(--accent2); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg); border-radius: 20px; width: 100%; max-width: 360px; overflow: hidden; }
.modal-img { width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; background: var(--tag-bg); font-size: 64px; }
.modal-body { padding: 1.25rem 1.5rem 1.5rem; }
.modal-name { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 6px; }
.modal-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
.modal-footer { display: flex; align-items: center; justify-content: space-between; }
.modal-price { font-size: 22px; font-weight: 700; color: var(--accent); }
.modal-add {
  padding: 10px 24px; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .2s;
}
.modal-add:hover { background: var(--accent2); }
.modal-close-top {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.4); color: #fff; border: none;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--text); color: #fff; padding: 10px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 500; z-index: 500;
  transition: transform .3s ease; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* FOOTER */
.footer {
  background: var(--text); color: rgba(255,255,255,0.5);
  text-align: center; padding: 1.5rem; font-size: 12px; margin-top: 2rem;
}
.footer a { color: var(--accent2); text-decoration: none; }

.hidden { display: none !important; }
</style>
</head>

<div class="categories" id="categories">

</div>

<div class="section">
  <div class="section-title" id="sectionTitle">Всё меню</div>
  <div class="grid" id="menuGrid"></div>
</div>

<footer class="footer">

</footer>

<!-- Cart Drawer -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">

      <span class="total-amount" id="totalAmount">0 ₸</span>

      Заказать в WhatsApp
    </button>
  </div>
</div>

<!-- Item Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close-top" onclick="closeModalBtn()">✕</button>
    <div class="modal-img" id="modalEmoji"></div>
    <div class="modal-body">
      <div id="modalBadge"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-footer">
        <div class="modal-price" id="modalPrice"></div>
        <button class="modal-add" id="modalAddBtn">+ В корзину</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let cart = [];
let currentItem = null;

function renderMenu(filter = 'all') {
  const grid = document.getElementById('menuGrid');
  const items = filter === 'all' ? menu : filter === 'hot' ? menu.filter(i=>i.badge==='hot') : menu.filter(i=>i.cat===filter);
  grid.innerHTML = items.map(item => `
    <div class="card" onclick="openModal(${item.id})">
      <div class="card-img">${item.img ? `<img src="${item.img}" style="width:100%;height:100%;object-fit:cover">` : item.emoji}</div>
      <div class="card-body">
        ${item.badge === 'hot' ? '<div class="badge-hot">Хит</div>' : item.badge === 'new' ? '<div class="badge-new">Новинка</div>' : '<div style="height:18px"></div>'}
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-footer">
          <div class="card-price">${item.price.toLocaleString('ru-RU')} ₸</div>
          <button class="add-btn" onclick="addToCart(event, ${item.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titles = { all:'Всё меню', hot:'Хиты', soup:'Супы', main:'Горячее', salad:'Салаты', combo:'Комбо', drink:'Напитки' };
  document.getElementById('sectionTitle').textContent = titles[cat] || 'Меню';
  renderMenu(cat);
}

function addToCart(e, id) {
  if(e) e.stopPropagation();
  const item = menu.find(m => m.id === id);
  const existing = cart.find(c => c.id === id);
  if(existing) existing.qty++;
  else cart.push({ ...item, qty: 1 });
  updateCartCount();
  showToast(`${item.emoji} ${item.name} добавлен в корзину`);
  if(currentItem && currentItem.id === id) closeModalBtn();
}

function updateCartCount() {
  const total = cart.reduce((s,i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = total;
}

function openCart() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderCart();
}
function closeCart() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderCart() {
  const el = document.getElementById('drawerItems');
  const footer = document.getElementById('drawerFooter');
  if(!cart.length) {
    el.innerHTML = '<div class="empty-cart"><span class="emoji">🛒</span>Корзина пуста</div>';
    footer.style.display = 'none'; return;
  }
  footer.style.display = 'block';
  el.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-emoji">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${(item.price * item.qty).toLocaleString('ru-RU')} ₸</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
      </div>
    </div>
  `).join('');
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  document.getElementById('totalAmount').textContent = total.toLocaleString('ru-RU') + ' ₸';
}

function changeQty(id, delta) {
  const idx = cart.findIndex(c => c.id === id);
  if(idx === -1) return;
  cart[idx].qty += delta;
  if(cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartCount();
  renderCart();
}

function sendOrder() {
  if(!cart.length) return;
  const lines = cart.map(i => `${i.emoji} ${i.name} x${i.qty} — ${(i.price*i.qty).toLocaleString('ru-RU')}₸`).join('\n');
  const total = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const msg = encodeURIComponent(`Здравствуйте! Хочу сделать заказ:\n\n${lines}\n\n💰 Итого: ${total.toLocaleString('ru-RU')} ₸\n\nПожалуйста уточните адрес доставки.`);
  window.open(`https://wa.me/${PHONE}?text=${msg}`, '_blank');
}

function openModal(id) {
  currentItem = menu.find(m => m.id === id);
  const mel = document.getElementById('modalEmoji'); if(currentItem.img){ mel.innerHTML = `<img src="${currentItem.img}" style="width:100%;height:100%;object-fit:cover">`; } else { mel.textContent = currentItem.emoji; }
  document.getElementById('modalName').textContent = currentItem.name;
  document.getElementById('modalDesc').textContent = currentItem.desc;
  document.getElementById('modalPrice').textContent = currentItem.price.toLocaleString('ru-RU') + ' ₸';
  document.getElementById('modalBadge').innerHTML = currentItem.badge === 'hot' ? '<div class="badge-hot" style="margin-bottom:6px">Хит продаж</div>' : currentItem.badge === 'new' ? '<div class="badge-new" style="margin-bottom:6px">Новинка</div>' : '';
  document.getElementById('modalAddBtn').onclick = () => { addToCart(null, id); closeModalBtn(); };
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) { if(e.target === document.getElementById('modalOverlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modalOverlay').classList.remove('open'); currentItem = null; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderMenu();
</script>
